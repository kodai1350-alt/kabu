name: 前場終了レポート (11:30 JST)

on:
  schedule:
    - cron: '0 2 * * 1-5'   # JST 11:00 起動 → ~5分 → 11:30頃届く
  workflow_dispatch:

jobs:
  morning-close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python close_report.py morning-close
        env:
          JQUANTS_API_KEY:      ${{ secrets.JQUANTS_API_KEY }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          ACCOUNT_BALANCE:      ${{ secrets.ACCOUNT_BALANCE }}
